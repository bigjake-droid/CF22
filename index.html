<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseForge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="app">

    <section class="hero">
      <img 
        src="https://i.postimg.cc/L47LwCJj/file-00000000880471f59e40f3cec1d4bf88.png" 
        alt="CaseForge Logo" 
        class="logo-img"
      >
    </section>

    <section class="input-card">
      <input id="title" placeholder="Document title">
      <input id="date" placeholder="Date (ex: Aug 6, 2025)">
      <textarea id="text" placeholder="Paste excerpt..."></textarea>

      <input type="file" id="fileUpload">

      <button onclick="addDoc()">Add Evidence</button>
    </section>

    <h2>Evidence Added</h2>
    <div id="docsBox"></div>

    <h2>Conflicts</h2>
    <div id="conflicts"></div>

    <h2>Investigator View</h2>
    <div id="analysis"></div>

    <h2>Leverage Points</h2>
    <div id="leverageBox"></div>

    <h2>Legal Pressure Score</h2>
    <div id="pressureBox"></div>

    <h2>Documents CaseForge Recommends</h2>
    <div id="requestBox"></div>

    <h2>Timeline</h2>
    <div id="timeline"></div>

    <button onclick="exportReport()">Export Report</button>
    <button onclick="clearCase()">Clear Saved Case</button>

  </main>

  <script src="script.js"></script>

</body>
</html>
