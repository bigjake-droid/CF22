<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaseForge</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <section class="hero">
      <img 
  src="https://i.postimg.cc/HkF97bcq/file-0000000056b071f5ab04f4cd5b8d3ab5.png"
  alt="CaseForge Logo"
  class="logo-img"
    </section>

    <section class="input-card">
      

      <input id="title" placeholder="Document title" />
      <input id="date" placeholder="Date ex: Aug 6, 2025" />
      <textarea id="text" placeholder="Paste excerpt, statement, report text, contradiction, or notes..."></textarea>

      <label class="file-label" for="fileUpload">Upload File</label>
      <input type="file" id="fileUpload" />

      <button class="primary-btn" onclick="addDoc()">Add Evidence</button>
    </section>

    <section class="dashboard-grid">

      <div class="panel">
        <h2>Evidence Added</h2>
        <div id="docsBox"></div>
      </div>

      <div class="panel">
        <h2>Conflicts</h2>
        <div id="conflicts"></div>
      </div>

      <div class="panel">
        <h2>Investigator View</h2>
        <div id="analysis"></div>
      </div>

      <div class="panel">
        <h2>Leverage Points</h2>
        <div id="leverageBox"></div>
      </div>

      <div class="panel">
        <h2>Legal Pressure Score</h2>
        <div id="pressureBox"></div>
      </div>

      <div class="panel">
        <h2>Recommended Requests</h2>
        <div id="requestBox"></div>
      </div>

      <div class="panel wide">
        <h2>Timeline</h2>
        <div id="timeline"></div>
      </div>

    </section>

    <section class="action-row">
      <button onclick="exportReport()">Export Report</button>
      <button class="danger-btn" onclick="clearCase()">Clear Saved Case</button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
